<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <section class="game-card" aria-label="Tic Tac Toe game">

            <div class="header">
                <p class="eyebrow">Simple everyday game</p>
                <h1>Tic Tac Toe</h1>
            </div>

            <!-- GAME MODE -->

            <div class="mode-selector">

                <button class="mode-btn active" id="pvpBtn">
                    Player vs Player
                </button>

                <button class="mode-btn" id="aiBtn">
                    Player vs Computer
                </button>

            </div>

            <!-- OPTIONS -->

            <div class="options-grid">

                <label class="option-field" for="difficultySelect">
                    <span>Difficulty</span>
                    <select id="difficultySelect">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </label>

                <label class="option-field" for="starterSelect">
                    <span>First Move</span>
                    <select id="starterSelect">
                        <option value="X" selected>Player X</option>
                        <option value="O">Player O or Computer</option>
                        <option value="random">Random</option>
                    </select>
                </label>

            </div>

            <!-- SCOREBOARD -->

            <div class="score-board">

                <div class="score-box">
                    <h3>Player X</h3>
                    <span id="playerScore">0</span>
                </div>

                <div class="score-box">
                    <h3>Player O or Computer</h3>
                    <span id="computerScore">0</span>
                </div>

                <div class="score-box">
                    <h3>Draws</h3>
                    <span id="drawScore">0</span>
                </div>

            </div>

            <!-- STATUS -->

            <div class="status" id="status">
                Player X's Turn
            </div>

            <!-- GAME BOARD -->

            <div class="board">

                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>

                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>

                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>

            </div>

            <!-- BUTTON -->

            <div class="actions">
                <button id="restartBtn" class="primary-btn">
                    New Game
                </button>

                <button id="resetScoreBtn" class="secondary-btn">
                    Reset Scores
                </button>
            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
